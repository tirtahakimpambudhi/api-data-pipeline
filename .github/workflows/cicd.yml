name: CI & CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          touch database/database.sqlite
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build assets
        run: npm run build

      - name: Prepare app
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force

      - name: Run tests
        run: ./vendor/bin/pest tests/Feature/Models

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-php:${{ github.sha }}
            ghcr.io/${{ github.repository }}-nginx:${{ github.sha }}

      - name: Generate prod.docker-compose.yml
        run: |
          export APP_IMAGE=ghcr.io/${{ github.repository }}-php:${{ github.sha }}
          export WEB_SERVER_IMAGE=ghcr.io/${{ github.repository }}-nginx:${{ github.sha }}

          envsubst '
            $APP_IMAGE
            $WEB_SERVER_IMAGE
          ' < docker-compose.tpl.yaml > prod.docker-compose.yml

      - name: Upload compose artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-compose
          path: prod.docker-compose.yml

  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Download compose artifact
        uses: actions/download-artifact@v4
        with:
          name: prod-compose
      - name: Debug SSH inputs
        run: |
          echo "USERNAME='${{ secrets.USERNAME }}'"
          echo "HOST='${{ secrets.HOST }}'"
          echo "PORT='${{ secrets.PORT }}'"
          
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.4
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

          APP_ENV: ${{ vars.APP_ENV }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_NAME: ${{ vars.APP_NAME }}
          APP_DEBUG: ${{ vars.APP_DEBUG }}

          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM_ADDRESS: ${{ secrets.MAIL_USERNAME }}
          MAIL_FROM_NAME: ${{ vars.APP_NAME }}

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 1h

          envs: |
            GHCR_USERNAME
            GHCR_PAT
            APP_ENV
            APP_KEY
            APP_NAME
            APP_DEBUG
            ADMIN_EMAIL
            ADMIN_USERNAME
            ADMIN_PASSWORD
            MAIL_USERNAME
            MAIL_PASSWORD
            MAIL_FROM_ADDRESS
            MAIL_FROM_NAME

          script: |
            set -e

            APP_DIR="/opt/$(basename '${{ github.repository }}')"
            cd "$APP_DIR"

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            envsubst '
              $APP_ENV
              $APP_KEY
              $APP_NAME
              $APP_DEBUG
              $ADMIN_EMAIL
              $ADMIN_USERNAME
              $ADMIN_PASSWORD
              $MAIL_USERNAME
              $MAIL_PASSWORD
              $MAIL_FROM_ADDRESS
              $MAIL_FROM_NAME
            ' < .env.example > .env

            mkdir -p database
            touch database/database.sqlite

            docker compose -f prod.docker-compose.yml pull
            docker compose -f prod.docker-compose.yml up -d
