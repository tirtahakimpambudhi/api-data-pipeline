name: Continuous Integration

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - master

permissions:
  contents: write
  packages: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Create Database Sqlite File & Install Dependencies
        run: touch database/database.sqlite && composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build Assets
        run: npm run build

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Migrate Database
        run: php artisan migrate --force

      - name: Tests Models
        run: ./vendor/bin/pest tests/Feature/Models

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}


      - name: Build & Push PHP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: phpapp
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-php:latest
            ghcr.io/${{ github.repository }}-php:${{ github.sha }}

      - name: Build & Push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: nginxapp
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-nginx:latest
            ghcr.io/${{ github.repository }}-nginx:${{ github.sha }}

      - name: Generate prod.docker-compose.yml from template
        run: |
          envsubst < docker-compose.tpl.yml > prod.docker-compose.yml
          cat prod.docker-compose.yml
