
services:
  mysql:
    image: mariadb:latest
    container_name: mysql-aino-svc-conf
    env_file:
      - .env.mysql
    ports:
      - 3308:3306
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
